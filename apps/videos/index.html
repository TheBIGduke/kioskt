<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Videos</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            overflow: hidden;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #overlay {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            gap: 16px;
            z-index: 10;
        }

        #overlay.hidden {
            display: none;
        }

        #overlay svg {
            width: 64px;
            height: 64px;
            opacity: 0.4;
        }

        #overlay p {
            margin: 0;
            font-size: 1.1rem;
            opacity: 0.6;
        }
    </style>
</head>

<body>
    <div id="overlay">
        <svg viewBox="0 0 24 24" fill="white">
            <path d="M4 6l4 6-4 6V6zm6 0h10v2H10V6zm0 4h10v2H10v-2zm0 4h10v2H10v-2z" />
        </svg>
        <p id="overlay-msg">Loading playlist…</p>
    </div>
    <video id="player" autoplay muted></video>

    <script>
        const player = document.getElementById('player');
        const overlay = document.getElementById('overlay');
        const overlayMsg = document.getElementById('overlay-msg');

        let playlist = [];
        let currentIndex = 0;

        async function loadPlaylist() {
            try {
                const res = await fetch('/api/media');
                if (!res.ok) throw new Error('API error');
                playlist = await res.json();
            } catch (_) {
                playlist = [];
            }

            if (playlist.length === 0) {
                overlayMsg.textContent = 'No videos found in the media folder.';
                return;
            }

            overlay.classList.add('hidden');
            playIndex(0);
        }

        function playIndex(i) {
            currentIndex = ((i % playlist.length) + playlist.length) % playlist.length;
            player.src = playlist[currentIndex];
            player.load();
            player.play().catch(() => { });
        }

        player.addEventListener('ended', () => {
            playIndex(currentIndex + 1);
        });

        player.addEventListener('error', () => {
            // skip broken videos
            if (playlist.length > 1) {
                playIndex(currentIndex + 1);
            }
        });

        loadPlaylist();
    </script>
</body>

</html>
